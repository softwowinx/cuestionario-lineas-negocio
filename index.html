<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wowinX · Cómo trabajamos nuestras líneas de negocio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F4ED;
    --surface:#FFFFFF;
    --ink:#1C1B19;
    --ink-soft:#5C594F;
    --line:#E4DECF;
    --line-strong:#D2C9B2;
    --accent:#C8A24B;
    --accent-soft:#F3ECD8;
    --radius:14px;
    --shadow:0 1px 2px rgba(28,27,25,.04), 0 8px 24px rgba(28,27,25,.05);
    --serif:'Cormorant Garamond', Georgia, serif;
    --sans:'Jost', system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-weight:400;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ---------- Header ---------- */
  header.bar{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;gap:14px;
    padding:12px 18px;
    background:rgba(247,244,237,.92);
    backdrop-filter:saturate(140%) blur(8px);
    border-bottom:1px solid var(--line);
  }
  .logo{height:52px;width:auto;border-radius:8px;display:block;flex:0 0 auto}
  .logo-fallback{
    height:52px;display:flex;align-items:center;padding:0 16px;
    background:#0F0F0E;color:#fff;border-radius:8px;
    font-family:var(--serif);font-weight:600;font-size:1.35rem;letter-spacing:.5px;
  }
  .bar-spacer{flex:1 1 auto}
  .bar-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

  /* ---------- Buttons ---------- */
  button{font-family:var(--sans);cursor:pointer;border:none;background:none}
  .btn{
    font-size:.9rem;font-weight:500;letter-spacing:.2px;
    padding:10px 16px;border-radius:999px;
    border:1px solid var(--line-strong);
    background:var(--surface);color:var(--ink);
    transition:border-color .15s, background .15s, transform .05s;
    min-height:42px;
  }
  .btn:hover{border-color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  .btn-ghost{border-color:transparent;background:transparent;color:var(--ink-soft)}
  .btn-ghost:hover{color:var(--ink);border-color:var(--line)}
  .btn-primary{
    background:var(--accent);border-color:var(--accent);color:#1C1B19;font-weight:600;
  }
  .btn-primary:hover{background:#bb9540;border-color:#bb9540}

  /* ---------- Layout ---------- */
  main{max-width:760px;margin:0 auto;padding:28px 18px 80px}
  .view{display:none}
  .view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* ---------- Home ---------- */
  .hero{text-align:center;padding:18px 4px 30px}
  .hero h1{
    font-family:var(--serif);font-weight:600;
    font-size:clamp(2.1rem,7vw,3.2rem);line-height:1.05;
    margin:0 0 14px;letter-spacing:.3px;
  }
  .hero .kicker{
    font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;
    color:var(--accent);font-weight:500;margin-bottom:14px;
  }
  .hero p{color:var(--ink-soft);font-size:1.05rem;max-width:48ch;margin:0 auto}

  .lineas{display:flex;flex-direction:column;gap:14px;margin-top:8px}
  .linea-card{
    display:flex;align-items:center;gap:16px;text-align:left;width:100%;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:20px 18px;box-shadow:var(--shadow);
    transition:border-color .15s, transform .06s;
  }
  .linea-card:hover{border-color:var(--line-strong)}
  .linea-card:active{transform:translateY(1px)}
  .linea-num{
    font-family:var(--serif);font-size:1.7rem;font-weight:600;
    color:var(--accent);flex:0 0 auto;width:34px;text-align:center;
  }
  .linea-body{flex:1 1 auto;min-width:0}
  .linea-body h2{font-family:var(--serif);font-weight:600;font-size:1.5rem;margin:0 0 2px}
  .linea-body .desc{color:var(--ink-soft);font-size:.9rem;margin:0 0 8px}
  .linea-arrow{font-size:1.4rem;color:var(--ink-soft);flex:0 0 auto}

  .pill{
    display:inline-flex;align-items:center;gap:6px;
    font-size:.78rem;font-weight:500;padding:4px 10px;border-radius:999px;
    background:#F0ECE0;color:var(--ink-soft);
  }
  .pill.done{background:var(--accent-soft);color:#8a6d24}
  .pill .tick{color:var(--accent);font-weight:700}

  .home-foot{text-align:center;margin-top:26px}

  /* ---------- Linea view ---------- */
  .linea-head{margin-bottom:8px}
  .linea-head .kicker{
    font-size:.74rem;letter-spacing:.26em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
  }
  .linea-head h1{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,6vw,2.6rem);margin:6px 0 4px}
  .linea-head .desc{color:var(--ink-soft);margin:0}

  .progress-wrap{
    position:sticky;top:77px;z-index:10;
    background:var(--bg);padding:12px 0 14px;margin-bottom:6px;
    border-bottom:1px solid var(--line);
  }
  .progress-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--ink-soft);margin-bottom:7px}
  .progress-track{height:6px;background:#E7E1D2;border-radius:999px;overflow:hidden}
  .progress-fill{height:100%;width:0;background:var(--accent);border-radius:999px;transition:width .3s ease}

  /* ---------- Question card ---------- */
  .q-card{
    background:var(--surface);border:1px solid var(--line);
    border-left:3px solid var(--line);
    border-radius:var(--radius);padding:20px 18px;margin:16px 0;
    box-shadow:var(--shadow);transition:border-color .2s;
  }
  .q-card:focus-within{border-left-color:var(--accent)}
  .q-card.answered{border-left-color:var(--accent)}
  .q-head{display:flex;gap:12px;align-items:baseline;margin-bottom:14px}
  .q-num{
    font-family:var(--serif);font-size:1.25rem;font-weight:600;color:var(--accent);
    flex:0 0 auto;line-height:1.2;
  }
  .q-text{font-size:1.12rem;font-weight:500;margin:0;line-height:1.35}
  .q-answered-tick{margin-left:auto;color:var(--accent);font-weight:700;opacity:0;transition:opacity .2s;font-size:1.05rem}
  .q-card.answered .q-answered-tick{opacity:1}

  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{
    display:flex;align-items:center;gap:12px;
    border:1px solid var(--line);border-radius:11px;
    padding:13px 14px;cursor:pointer;min-height:50px;
    transition:border-color .12s, background .12s;
    user-select:none;
  }
  .opt:hover{border-color:var(--line-strong)}
  .opt:has(input:checked){border-color:var(--accent);background:var(--accent-soft)}
  .opt input{position:absolute;opacity:0;width:0;height:0}
  .opt-box{
    flex:0 0 auto;width:22px;height:22px;border:2px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;
    font-size:.8rem;color:#fff;transition:all .12s;
  }
  .opt input[type=radio]~.opt-box{border-radius:50%}
  .opt input[type=checkbox]~.opt-box{border-radius:6px}
  .opt:has(input:checked) .opt-box{background:var(--accent);border-color:var(--accent)}
  .opt:has(input[type=radio]:checked) .opt-box::after{content:"";width:9px;height:9px;border-radius:50%;background:#fff}
  .opt:has(input[type=checkbox]:checked) .opt-box::after{content:"✓"}
  .opt-txt{flex:1 1 auto;font-size:1rem;line-height:1.35}

  /* ---------- Orden ---------- */
  .orden-hint{font-size:.82rem;color:var(--ink-soft);margin:0 0 10px}
  .orden-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
  .orden-item{
    display:flex;align-items:center;gap:12px;
    border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surface);
  }
  .orden-pos{
    flex:0 0 auto;width:30px;height:30px;border-radius:50%;
    background:var(--accent-soft);color:#8a6d24;font-weight:600;
    display:flex;align-items:center;justify-content:center;font-size:.95rem;
  }
  .orden-txt{flex:1 1 auto;font-size:1rem;line-height:1.3}
  .orden-ctrls{flex:0 0 auto;display:flex;gap:6px}
  .orden-ctrls button{
    width:38px;height:38px;border-radius:9px;border:1px solid var(--line-strong);
    background:var(--surface);font-size:1rem;color:var(--ink);
    display:flex;align-items:center;justify-content:center;
  }
  .orden-ctrls button:hover{border-color:var(--ink)}
  .orden-ctrls button:disabled{opacity:.3;cursor:default}

  /* ---------- Matiz ---------- */
  .matiz-wrap{margin-top:14px}
  .matiz-wrap label{display:block;font-size:.8rem;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.02em}
  textarea.matiz{
    width:100%;min-height:44px;resize:vertical;
    font-family:var(--sans);font-size:.95rem;color:var(--ink);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#FCFBF7;
    transition:border-color .12s;
  }
  textarea.matiz:focus{outline:none;border-color:var(--accent)}

  .linea-foot{display:flex;justify-content:space-between;gap:10px;margin-top:26px;flex-wrap:wrap}

  /* ---------- Resumen ---------- */
  .resumen-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .resumen-head h1{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,6vw,2.6rem);margin:0}
  .resumen-block{margin-top:26px}
  .resumen-block h2{
    font-family:var(--serif);font-weight:600;font-size:1.55rem;
    border-bottom:1px solid var(--line);padding-bottom:7px;margin:0 0 4px;
  }
  .resumen-block .blk-kicker{font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);font-weight:500}
  .r-item{padding:13px 0;border-bottom:1px dashed var(--line)}
  .r-q{font-weight:500;font-size:1rem;margin:0 0 5px}
  .r-q .r-qn{color:var(--accent);font-weight:600;margin-right:6px}
  .r-a{margin:0;color:var(--ink);font-size:.97rem}
  .r-a .r-line{display:flex;gap:8px;padding:2px 0}
  .r-a .r-bullet{color:var(--accent);flex:0 0 auto}
  .r-empty{color:var(--line-strong);font-style:italic}
  .r-note{color:var(--ink-soft);font-size:.9rem;margin-top:4px;padding-left:2px;border-left:2px solid var(--accent-soft);padding:3px 0 3px 10px}

  .send-area{display:flex;align-items:center;gap:10px}
  .send-msg{font-size:.95rem;margin:12px 0 0;min-height:1.3em;font-weight:500}
  .send-msg.ok{color:#5a7d3a}
  .send-msg.err{color:#b4462f}
  .send-msg.warn{color:#8a6d24}
  #send-answers:disabled{opacity:.55;cursor:default}

  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;
    font-size:.9rem;opacity:0;pointer-events:none;transition:all .25s;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:520px){
    header.bar{padding:10px 14px}
    main{padding:22px 14px 80px}
    .linea-card{padding:18px 15px}
    .q-card{padding:18px 15px}
    .bar-actions .btn{padding:9px 13px;font-size:.85rem}
  }
</style>
</head>
<body>

<header class="bar">
  <img class="logo" src="wowinx_logo.jpeg" alt="wowinX"
       onerror="this.outerHTML='<div class=&quot;logo-fallback&quot;>wowinX</div>'">
  <div class="bar-spacer"></div>
  <div class="bar-actions">
    <button class="btn btn-ghost" id="nav-home">← Inicio</button>
    <button class="btn" id="nav-resumen">Ver resumen</button>
  </div>
</header>

<main>
  <!-- ============ HOME ============ -->
  <section class="view active" id="view-home">
    <div class="hero">
      <div class="kicker">wowinX</div>
      <h1>Cómo trabajamos nuestras líneas de negocio</h1>
      <p>Un repaso, línea a línea, de cómo funcionamos por dentro. Entra en la que quieras y en el orden que prefieras; tus respuestas se guardan solas.</p>
    </div>
    <div class="lineas" id="home-lineas"></div>
    <div class="home-foot">
      <button class="btn btn-primary" id="home-resumen">Ver resumen de todo →</button>
    </div>
  </section>

  <!-- ============ LINEA ============ -->
  <section class="view" id="view-linea">
    <div class="linea-head">
      <div class="kicker" id="linea-kicker"></div>
      <h1 id="linea-title"></h1>
      <p class="desc" id="linea-desc"></p>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-text">0 de 0 respondidas</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div id="preguntas"></div>
    <div class="linea-foot">
      <button class="btn btn-ghost" id="linea-back">← Volver al inicio</button>
      <button class="btn btn-primary" id="linea-resumen">Ver resumen →</button>
    </div>
  </section>

  <!-- ============ RESUMEN ============ -->
  <section class="view" id="view-resumen">
    <div class="resumen-head">
      <h1>Resumen de respuestas</h1>
      <div class="send-area">
        <button class="btn btn-primary" id="send-answers">Enviar respuestas</button>
      </div>
    </div>
    <p class="send-msg" id="send-msg" role="status" aria-live="polite"></p>
    <div id="resumen-content"></div>
    <div class="linea-foot">
      <button class="btn btn-ghost" id="resumen-back">← Volver al inicio</button>
      <button class="btn btn-ghost" id="reset-all" style="color:#a35;">Empezar de cero</button>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   DATOS — edita aquí las preguntas. Cada pregunta:
     { id, tipo: 'unica' | 'multiple' | 'orden', texto, opciones: [...] }
   ========================================================================= */
const LINEAS = [
  {
    id: 'inversion',
    nombre: 'Inversión',
    desc: 'Intermediación para conseguir inversión para una empresa',
    preguntas: [
      { id:'p1', tipo:'unica', texto:'¿Por dónde nos entra normalmente una operación?', opciones:[
        'Nos llega primero la empresa que busca inversión',
        'Nos llega primero el inversor buscando dónde invertir',
        'Nos entra por los dos lados, según el caso',
        'Solemos conocer ya a ambas partes' ]},
      { id:'p2', tipo:'orden', texto:'Cuando nos llega una empresa, ¿qué hacemos y en qué orden?', opciones:[
        'Nos reunimos con ella para entender qué necesita',
        'La analizamos a fondo (viabilidad, números, encaje)',
        'Firmamos el mandato/acuerdo con ella',
        'Preparamos el material para presentarla',
        'Otro' ]},
      { id:'p3', tipo:'unica', texto:'¿En qué momento firmamos el mandato con la empresa?', opciones:[

        'No siempre firmamos mandato' ]},

        'NDA con la empresa',
        'Hoja de condiciones / fee agreement',
        'Otro' ]},
      { id:'p5', tipo:'unica', texto:'¿Cuándo dejamos pactado nuestro fee por la gestión?', opciones:[

        'Lo negociamos aparte, más adelante',
        'Depende de la operación',
        'Aún no lo tenemos claro' ]},
      { id:'p6', tipo:'unica', texto:'¿A quién le cobramos el fee?', opciones:[
        'A la empresa (a la que le conseguimos la inversión)',

        'Un % a cada lado',
        'Depende / aún no definido' ]},
      { id:'p7', tipo:'multiple', texto:'¿Cómo estructuramos nuestro fee?', opciones:[

      { id:'p8', tipo:'unica', texto:'Ya con el análisis hecho, ¿cómo arrancamos la búsqueda de dinero?', opciones:[

        'Otro' ]},
      { id:'p9', tipo:'multiple', texto:'¿Qué material preparamos para presentar la operación?', opciones:[
        'Teaser (resumen anónimo de una página)',
        'Dossier / memorándum de inversión',
        'Pitch deck',
        'Modelo financiero / proyecciones',

      { id:'p10', tipo:'unica', texto:'¿Cómo contactamos a los inversores?', opciones:[

      { id:'p12', tipo:'multiple', texto:'Ya con el inversor dentro, ¿qué pasos damos en la negociación?', opciones:[

      { id:'p13', tipo:'unica', texto:'¿Cuánto peso llevamos nosotros en esa negociación?', opciones:[
        'Intermediamos activamente, llevamos la negociación',
        'Dejamos que negocien directamente empresa e inversor',

      { id:'p14', tipo:'unica', texto:'¿Cuándo damos una operación por CERRADA (ganada)?', opciones:[
        'Cuando se firma el acuerdo de inversión',

      { id:'p15', tipo:'unica', texto:'¿Cuándo cobramos nuestro fee?', opciones:[

      { id:'p16', tipo:'multiple', texto:'¿Qué hace que se nos caiga una operación?', opciones:[

        'La empresa se va con otro intermediario',
        'Otro' ]},
      { id:'p17', tipo:'multiple', texto:'Una vez cerrada, ¿qué hacemos después?', opciones:[
        'Nada, para nosotros termina al cobrar',

        'Mantenemos la relación con la empresa para futuras rondas',
        'Mantenemos la relación con el inversor para futuras operaciones',
        'Controlamos nuestro fee si se cobra a plazos',
        'Otro' ]},
      { id:'p18', tipo:'unica', texto:'¿Hasta cuándo seguimos haciendo ese seguimiento?', opciones:[

        'De forma indefinida, mantenemos viva la relación',
        'Un periodo concreto (especificar)',
        'No hacemos seguimiento formal' ]},
    ]
  },
  {
    id: 'patrocinios',
    nombre: 'Patrocinios',
    desc: 'Intermediación para conseguir patrocinadores o marcas colaboradoras',
    preguntas: [
      { id:'p1', tipo:'unica', texto:'¿Por dónde nos entra normalmente una operación?', opciones:[
        'Nos llega el proyecto/evento que busca patrocinador',
        'Nos llega la marca que quiere patrocinar algo',

      { id:'p2', tipo:'orden', texto:'Cuando nos llega un proyecto que busca patrocinio, ¿qué hacemos y en qué orden?', opciones:[

      { id:'p3', tipo:'unica', texto:'¿En qué momento firmamos el acuerdo con el proyecto?', opciones:[

      { id:'p4', tipo:'multiple', texto:'¿Con qué documento(s) formalizamos el acuerdo con el proyecto?', opciones:[
        'Mandato de búsqueda de patrocinio',
        'Acuerdo de exclusividad',
        'NDA',
        'Hoja de condiciones / fee agreement',
        'Otro' ]},
      { id:'p5', tipo:'unica', texto:'¿Cuándo dejamos pactado nuestro fee?', opciones:[

/* =========================================================================
   ESTADO + PERSISTENCIA
   ========================================================================= */
const STORE_KEY = 'wowinx_cuestionario_v1';
let state = loadState();
let currentLinea = null;

function loadState(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveState(){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){}
}
function ansFor(lid, qid){
  if(!state[lid]) state[lid] = {};
  if(!state[lid][qid]) state[lid][qid] = {};
  return state[lid][qid];
}
function isAnswered(q, a){
  if(!a) return false;
  if(q.tipo==='unica')    return typeof a.choice === 'number';
  if(q.tipo==='multiple') return Array.isArray(a.choices) && a.choices.length > 0;
  if(q.tipo==='orden')    return Array.isArray(a.order);
  return false;
}
function lineaProgress(linea){
  const ls = state[linea.id] || {};
  let done = 0;
  linea.preguntas.forEach(q => { if(isAnswered(q, ls[q.id])) done++; });
  return { done, total: linea.preguntas.length };
}

/* =========================================================================
   UTILIDADES
   ========================================================================= */
function esc(s){
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function $(sel){ return document.querySelector(sel); }
function show(viewId){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $('#'+viewId).classList.add('active');
  window.scrollTo({top:0});
}
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>t.classList.remove('show'), 1800);
}

function renderHome(){
  const wrap = $('#home-lineas');
  wrap.innerHTML = LINEAS.map((l, i) => {
    const {done, total} = lineaProgress(l);
    const complete = done === total;
    const pill = complete
      ? `<span class="pill done"><span class="tick">✓</span> Completa</span>`
      : (done > 0
          ? `<span class="pill">${done} de ${total} respondidas</span>`
          : `<span class="pill">Sin empezar · ${total} preguntas</span>`);
    return `
      <button class="linea-card" data-linea="${l.id}">
        <span class="linea-num">${i+1}</span>
        <span class="linea-body">
          <h2>${esc(l.nombre)}</h2>
          <p class="desc">${esc(l.desc)}</p>
          ${pill}
        </span>
        <span class="linea-arrow">→</span>
      </button>`;
  }).join('');
  wrap.querySelectorAll('.linea-card').forEach(btn => {
    btn.addEventListener('click', () => openLinea(btn.dataset.linea));
  });
  show('view-home');
}

/* =========================================================================
   LÍNEA
   ========================================================================= */
function openLinea(id){
  currentLinea = LINEAS.find(l => l.id === id);
  $('#linea-kicker').textContent = 'Línea de negocio';
  $('#linea-title').textContent = currentLinea.nombre;
  $('#linea-desc').textContent = currentLinea.desc;
  renderPreguntas();
  updateProgress();
  show('view-linea');
}

function renderPreguntas(){
  const l = currentLinea;
  $('#preguntas').innerHTML = l.preguntas.map((q, i) =>
    renderPregunta(l.id, q, i+1)
  ).join('');
  bindPreguntas();
}

function renderPregunta(lid, q, num){
  const a = ansFor(lid, q.id);
  const answered = isAnswered(q, a) ? 'answered' : '';
  let body = '';

  if(q.tipo === 'unica'){
    body = `<div class="opts">` + q.opciones.map((opt, i) => `
      <label class="opt">
        <input type="radio" name="${lid}-${q.id}" data-l="${lid}" data-q="${q.id}" data-i="${i}"
          ${a.choice === i ? 'checked' : ''}>
        <span class="opt-box"></span>
        <span class="opt-txt">${esc(opt)}</span>
      </label>`).join('') + `</div>`;
  }
  else if(q.tipo === 'multiple'){
    const sel = a.choices || [];
    body = `<div class="opts">` + q.opciones.map((opt, i) => `
      <label class="opt">
        <input type="checkbox" data-l="${lid}" data-q="${q.id}" data-i="${i}"
          ${sel.includes(i) ? 'checked' : ''}>
        <span class="opt-box"></span>
        <span class="opt-txt">${esc(opt)}</span>
      </label>`).join('') + `</div>`;
  }
  else if(q.tipo === 'orden'){
    body = `<p class="orden-hint">Ordénalas con las flechas ↑ ↓ (de primero a último).</p>
      <ul class="orden-list" id="orden-${lid}-${q.id}">${renderOrdenItems(lid, q)}</ul>`;
  }

  return `
    <div class="q-card ${answered}" id="card-${lid}-${q.id}">
      <div class="q-head">
        <span class="q-num">${num}</span>
        <p class="q-text">${esc(q.texto)}</p>
        <span class="q-answered-tick">✓</span>
      </div>
      ${body}
      <div class="matiz-wrap">
        <label for="matiz-${lid}-${q.id}">Matizar / añadir (opcional)</label>
        <textarea class="matiz" id="matiz-${lid}-${q.id}" data-l="${lid}" data-q="${q.id}"
          rows="1" placeholder="Escribe aquí si quieres puntualizar algo…">${esc(a.note || '')}</textarea>
      </div>
    </div>`;
}

function renderOrdenItems(lid, q){
  const a = ansFor(lid, q.id);
  const order = a.order || q.opciones.map((_, i) => i); // orden natural por defecto
  return order.map((optIdx, pos) => `
    <li class="orden-item" data-pos="${pos}">
      <span class="orden-pos">${pos+1}</span>
      <span class="orden-txt">${esc(q.opciones[optIdx])}</span>
      <span class="orden-ctrls">
        <button data-l="${lid}" data-q="${q.id}" data-dir="up" data-pos="${pos}"
          ${pos===0?'disabled':''} aria-label="Subir">↑</button>
        <button data-l="${lid}" data-q="${q.id}" data-dir="down" data-pos="${pos}"
          ${pos===order.length-1?'disabled':''} aria-label="Bajar">↓</button>
      </span>
    </li>`).join('');
}

function bindPreguntas(){
  const root = $('#preguntas');

  // radios + checkboxes
  root.querySelectorAll('input[type=radio], input[type=checkbox]').forEach(inp => {
    inp.addEventListener('change', () => {
      const {l, q, i} = inp.dataset;
      const a = ansFor(l, q);
      if(inp.type === 'radio'){
        a.choice = parseInt(i, 10);
      } else {
        const idx = parseInt(i, 10);
        a.choices = a.choices || [];
        if(inp.checked){ if(!a.choices.includes(idx)) a.choices.push(idx); }
        else { a.choices = a.choices.filter(x => x !== idx); }
        a.choices.sort((x,y)=>x-y);
      }
      saveState();
      markAnswered(l, q);
      updateProgress();
    });
  });

  // matiz
  root.querySelectorAll('textarea.matiz').forEach(ta => {
    autosize(ta);
    ta.addEventListener('input', () => {
      const {l, q} = ta.dataset;
      ansFor(l, q).note = ta.value;
      saveState();
      autosize(ta);
    });
  });

  // orden
  root.querySelectorAll('.orden-ctrls button').forEach(btn => {
    btn.addEventListener('click', () => {
      const {l, q, dir, pos} = btn.dataset;
      moveOrden(l, q, parseInt(pos,10), dir);
    });
  });
}

function autosize(ta){
  ta.style.height = 'auto';
  ta.style.height = Math.max(44, ta.scrollHeight) + 'px';
}

function moveOrden(lid, qid, pos, dir){
  const q = currentLinea.preguntas.find(p => p.id === qid);
  const a = ansFor(lid, qid);
  const order = a.order ? a.order.slice() : q.opciones.map((_, i) => i);
  const swap = dir === 'up' ? pos - 1 : pos + 1;
  if(swap < 0 || swap >= order.length) return;
  [order[pos], order[swap]] = [order[swap], order[pos]];
  a.order = order;
  saveState();
  $('#orden-'+lid+'-'+qid).innerHTML = renderOrdenItems(lid, q);
  // re-bind solo de esa lista
  $('#orden-'+lid+'-'+qid).querySelectorAll('.orden-ctrls button').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = btn.dataset;
      moveOrden(d.l, d.q, parseInt(d.pos,10), d.dir);
    });
  });
  markAnswered(lid, qid);
  updateProgress();
}

function markAnswered(lid, qid){
  const q = currentLinea.preguntas.find(p => p.id === qid);
  const card = $('#card-'+lid+'-'+qid);
  if(!card) return;
  card.classList.toggle('answered', isAnswered(q, ansFor(lid, qid)));
}

function updateProgress(){
  const {done, total} = lineaProgress(currentLinea);
  const pct = total ? Math.round(done/total*100) : 0;
  $('#progress-text').textContent = `${done} de ${total} respondidas`;
  $('#progress-pct').textContent = pct + '%';
  $('#progress-fill').style.width = pct + '%';
}

/* =========================================================================
   RESUMEN
   ========================================================================= */
function answerLines(q, a){
  // devuelve array de strings (líneas de la respuesta)
  if(!isAnswered(q, a)) return null;
  if(q.tipo === 'unica')    return [ q.opciones[a.choice] ];
  if(q.tipo === 'multiple') return a.choices.map(i => q.opciones[i]);
  if(q.tipo === 'orden')    return a.order.map((i, pos) => `${pos+1}. ${q.opciones[i]}`);
  return null;
}

function renderResumen(){
  // cada vez que se abre el resumen, el botón queda listo para enviar
  enviado = false;
  const sb = $('#send-answers');
  if(sb){ sb.disabled = false; sb.textContent = 'Enviar respuestas'; }
  setSendMsg('', '');

  const blocks = LINEAS.map((l, li) => {
    // Solo preguntas contestadas; conservamos el número real (qi+1).
    const items = l.preguntas.map((q, qi) => {
      const a = (state[l.id] || {})[q.id] || {};
      const lines = answerLines(q, a);
      if(!lines) return '';                       // oculta las sin responder
      let ansHtml;
      if(q.tipo === 'unica'){
        ansHtml = `<div class="r-a"><div class="r-line"><span class="r-bullet">→</span><span>${esc(lines[0])}</span></div></div>`;
      } else if(q.tipo === 'orden'){
        ansHtml = `<div class="r-a">` + lines.map(t =>
          `<div class="r-line"><span>${esc(t)}</span></div>`).join('') + `</div>`;
      } else {
        ansHtml = `<div class="r-a">` + lines.map(t =>
          `<div class="r-line"><span class="r-bullet">✓</span><span>${esc(t)}</span></div>`).join('') + `</div>`;
      }
      const note = a.note && a.note.trim()
        ? `<div class="r-note">${esc(a.note.trim())}</div>` : '';
      return `<div class="r-item">
        <p class="r-q"><span class="r-qn">P${qi+1}.</span>${esc(q.texto)}</p>
        ${ansHtml}${note}
      </div>`;
    }).join('');
    if(!items) return '';                         // línea sin nada contestado: ni cabecera
    return `<div class="resumen-block">
      <div class="blk-kicker">Línea ${li+1}</div>
      <h2>${esc(l.nombre)}</h2>
      ${items}
    </div>`;
  }).join('');
  $('#resumen-content').innerHTML = blocks ||
    `<p class="r-empty" style="margin-top:24px;">Aún no has respondido ninguna pregunta. Entra en una línea y empieza cuando quieras.</p>`;
  show('view-resumen');
}

function buildPlainText(){
  const out = [];
  out.push('wowinX · Cómo trabajamos nuestras líneas de negocio');
  out.push('Resumen de respuestas');
  LINEAS.forEach((l, li) => {
    // ¿esta línea tiene algo contestado? si no, no aparece.
    const hayAlgo = l.preguntas.some((q) =>
      answerLines(q, (state[l.id] || {})[q.id] || {}));
    if(!hayAlgo) return;
    out.push('');
    out.push('══════════════════════════════════');
    out.push(`LÍNEA ${li+1} — ${l.nombre.toUpperCase()}`);
    out.push(l.desc);
    out.push('══════════════════════════════════');
    l.preguntas.forEach((q, qi) => {
      const a = (state[l.id] || {})[q.id] || {};
      const lines = answerLines(q, a);
      if(!lines) return;                          // omite las sin responder
      out.push('');
      out.push(`P${qi+1}. ${q.texto}`);
      if(q.tipo === 'orden'){
        lines.forEach(t => out.push('   ' + t));
      } else {
        lines.forEach(t => out.push('   → ' + t));
      }
      if(a.note && a.note.trim()){
        out.push('   Matiz: ' + a.note.trim());
      }
    });
  });
  return out.join('\n');
}

const FORMSPREE_ENDPOINT = 'https://formspree.io/f/mnjrodwk';
let enviado = false;

function totalAnswered(){
  let n = 0;
  LINEAS.forEach(l => l.preguntas.forEach(q => {
    if(answerLines(q, (state[l.id] || {})[q.id] || {})) n++;
  }));
  return n;
}

function setSendMsg(text, kind){
  const el = $('#send-msg');
  el.textContent = text || '';
  el.className = 'send-msg' + (kind ? ' ' + kind : '');
}

async function sendAnswers(){
  const btn = $('#send-answers');
  if(enviado) return;                              // ya enviado, no reenviar
  if(totalAnswered() === 0){
    setSendMsg('Aún no hay respuestas que enviar. Contesta alguna pregunta primero.', 'warn');
    return;
  }
  const prevLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Enviando…';
  setSendMsg('', '');

  try{
    const fd = new FormData();
    fd.append('respuestas', buildPlainText());
    fd.append('_subject', 'Respuestas cuestionario líneas wowinX');
    const res = await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 'Accept': 'application/json' },
      body: fd
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    enviado = true;
    btn.textContent = '✓ Enviado';
    btn.disabled = true;                           // deshabilitado para no reenviar
    setSendMsg('¡Respuestas enviadas! Gracias.', 'ok');
    toast('Respuestas enviadas');
  } catch(err){
    btn.disabled = false;                          // sigue activo para reintentar
    btn.textContent = prevLabel;
    setSendMsg('No se han podido enviar, revisa tu conexión e inténtalo de nuevo.', 'err');
  }
}
